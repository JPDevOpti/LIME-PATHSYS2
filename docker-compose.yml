services:
  mongo:
    image: mongo:7
    container_name: pathsys-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Back-End
      dockerfile: Dockerfile
    container_name: pathsys-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      DATABASE_NAME: ${DATABASE_NAME:-pathsys}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8002}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://127.0.0.1:3002,http://0.0.0.0:3002}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-please-change-in-prod-32-chars-min}
    ports:
      - "8002:8002"

  frontend:
    build:
      context: ./Front-End
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8002}
    container_name: pathsys-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8002}
    ports:
      - "3002:3002"

volumes:
  mongo_data:
